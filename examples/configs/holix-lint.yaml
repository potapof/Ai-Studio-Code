# ============================================================================
# holix-lint.yaml
# ============================================================================
# Holix Lint Agent — локальный агент для lint-and-fix loop в "Студии
# программирования" v2.0.
#
# Назначение:
#   Запускает авто-исправляемые линтеры (black, isort, eslint --fix, prettier)
#   на кодовой базе и коммитит исправления. НЕ использует OpenHands — работает
#   локально, дёшево и быстро. Идеален для поддержки стиля кода между
#   основными итерациями Loop Engineering.
#
# Ключевая особенность v2.0:
#   - Температура 0.0 — детерминированные коммиты.
#   - Минимальные лимиты (5000 tok/h, $0.50/день) — lint не требует больших
#     рассуждений.
#   - Формат commit message фиксирован: "style: auto-fix lint issues by
#     holix-lint [{tool_names}]".
#   - Никаких MCP-серверов и внешних сервисов — чисто локальная работа.
#
# LLM-провайдер: DeepSeek, deepseek-chat, температура 0.0 (объективность,
# детерминированные коммиты).
# ============================================================================

# ---------------------------------------------------------------------------
# 1. Профиль агента
# ---------------------------------------------------------------------------
profile:
  name: holix-lint
  role: linter
  description: >
    Локальный агент для lint-and-fix loop. Запускает авто-исправляемые
    линтеры и коммитит style-исправления. Не использует OpenHands.

# ---------------------------------------------------------------------------
# 2. LLM-модель
# ---------------------------------------------------------------------------
model:
  provider: deepseek
  name: deepseek-chat
  temperature: 0.0          # детерминированные коммиты
  max_tokens: 2048
  timeout: 60               # lint — быстрая задача

# ---------------------------------------------------------------------------
# 3. Инструменты
# ---------------------------------------------------------------------------
tools:
  enabled:
    - shell
    - files
  restricted_commands:
    - "git push"
    - "git merge"
    - "git rebase"
    - "sudo"
    - "docker *"
    - "curl *"
    - "wget *"
    - "rm -rf /"

# ---------------------------------------------------------------------------
# 4. Команды линтеров
# ---------------------------------------------------------------------------
# Запускаются последовательно. Если tool падает — логируется, но цикл
# продолжается (другие tools могут всё равно применить часть фиксов).
tools_commands:
  - name: black
    command: "black --line-length=120 ."
    apply_fixes: true              # black модифицирует файлы in-place
    fail_on_error: false

  - name: isort
    command: "isort --profile=black ."
    apply_fixes: true
    fail_on_error: false

  - name: eslint_fix
    command: "eslint --fix ."
    apply_fixes: true
    fail_on_error: false           # eslint может сообщить о неисправимых проблемах

  - name: prettier
    command: "prettier --write ."
    apply_fixes: true
    fail_on_error: false

# ---------------------------------------------------------------------------
# 5. Формат commit message
# ---------------------------------------------------------------------------
# {tool_names} подставляется списком через запятую: "black, isort".
# Пример: "style: auto-fix lint issues by holix-lint [black, isort]"
commit_message_format: "style: auto-fix lint issues by holix-lint [{tool_names}]"

# ---------------------------------------------------------------------------
# 6. Workspace (jail)
# ---------------------------------------------------------------------------
workspace:
  jail_path: /workspace/lint
  read_only_paths: []
  writable_paths:
    - /workspace/lint/repo          # клон репозитория для линтера
  max_file_size_mb: 10

# ---------------------------------------------------------------------------
# 7. Сеть (полная изоляция — lint не требует интернета)
# ---------------------------------------------------------------------------
network:
  egress_allow: []
  egress_deny:
    - "*"
  internal_services: []

# ---------------------------------------------------------------------------
# 8. Лимиты (минимальные — lint не требует больших рассуждений)
# ---------------------------------------------------------------------------
limits:
  max_tokens_per_hour: 5000
  max_requests_per_minute: 5
  daily_cost_usd_limit: 0.50
  max_commits_per_hour: 20

# ---------------------------------------------------------------------------
# 9. Healthcheck
# ---------------------------------------------------------------------------
healthcheck:
  command: "holix healthcheck --agent=lint"
  interval: 60s
  timeout: 10s
  retries: 3

# ---------------------------------------------------------------------------
# 10. Логирование
# ---------------------------------------------------------------------------
logging:
  level: info
  format: json
  destination: /var/log/holix/lint.log
  rotate_size_mb: 30
  rotate_keep: 7
  sanitize_secrets: true
