# ============================================================================
# openhands-config.toml
# ============================================================================
# Конфигурация OpenHands — внешнего подрядчика для трудоёмких задач в "Студии
# программирования" v2.0.
#
# Назначение:
#   OpenHands вызывается Hermes'ом (через Holix Coordinator) для выполнения
#   задач, требующих длительной работы в sandbox: рефакторинг, миграции,
#   написание новых модулей. После выполнения результат передаётся в Loop
#   Engineering на проверку.
#
# Ключевая особенность v2.0:
#   - В секции [mcp] подключается к "мозгу" (postgres MCP) в режиме
#     read_only — OpenHands может ЧИТАТЬ знания из мозга, но НЕ писать.
#     Запись идёт только через Архивариуса или Hermes.
#   - Squid-прокси ограничивает egress 10 доменами (LLM API, GitHub, PyPI,
#     npmjs).
#   - require_confirmation = false — рискованно, но необходимо для
#     автоматических loop-ов. Безопасность компенсируется: whitelist
#     доменов, disable_cmd, лимитами размера/времени, и тем, что результат
#     всегда проверяется независимым Checker'ом.
#
# Формат: TOML (TOML используется OpenHands нативно, не YAML).
# Все комментарии на русском, без эмодзи.
# ============================================================================

# ---------------------------------------------------------------------------
# LLM-модель
# ---------------------------------------------------------------------------
[llm]
model = "deepseek-chat"
api_key = "${DEEPSEEK_API_KEY}"
base_url = "https://api.deepseek.com"
temperature = 0.2              # точность при исполнении задач
max_tokens = 8192
timeout = 300                  # секунд на один запрос к LLM

# ---------------------------------------------------------------------------
# Sandbox (изоляция исполнения)
# ---------------------------------------------------------------------------
[sandbox]
type = "rh"                    # Runtime Host sandbox
base_path = "/workspace"
network_enabled = true         # сеть через прокси, не напрямую
http_proxy = "http://egress-proxy:3128"
https_proxy = "http://egress-proxy:3128"
allowed_domains = [
    "api.deepseek.com",
    "api.openai.com",
    "api.anthropic.com",
    "github.com",
    "api.github.com",
    "*.githubusercontent.com",
    "pypi.org",
    "files.pythonhosted.org",
    "registry.npmjs.org",
]

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------
[security]
require_confirmation = false   # автоматические loop-ы без подтверждения
disable_cmd = ["rm -rf /", "sudo *", "dd *", "mkfs *", "shutdown *", "reboot *"]
max_file_size_mb = 100         # лимит на один файл
max_total_size_mb = 1000       # суммарный лимит на workspace

# ---------------------------------------------------------------------------
# Workspace
# ---------------------------------------------------------------------------
[workspace]
base = "/workspace"
backup_path = "/workspace/.backups"
git_user_name = "OpenHands Studio Bot"
git_user_email = "openhands@studio.local"

# ---------------------------------------------------------------------------
# MCP-подключения
# ---------------------------------------------------------------------------
# OpenHands подключается к мозгу (postgres MCP) ТОЛЬКО для чтения. Запись
# запрещена на уровне SQL-роли — OpenHands не должен загрязнять мозг.
[mcp]
enabled = true
servers = ["hermes-brain-readonly"]

# ---------------------------------------------------------------------------
# Логирование
# ---------------------------------------------------------------------------
[logging]
level = "info"                 # debug | info | warn | error
sanitize_secrets = true        # маскировать sk-*, ghp_*, xox*, Bearer*

# ---------------------------------------------------------------------------
# Лимиты
# ---------------------------------------------------------------------------
[limits]
max_iterations = 50            # максимум итераций reasoning-act в одной задаче
max_tokens_per_task = 200000   # жёсткий лимит токенов на задачу
max_runtime_minutes = 30       # таймаут задачи
