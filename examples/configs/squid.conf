# ============================================================================
# squid.conf
# ============================================================================
# Конфигурация Squid-прокси для egress-proxy в "Студии программирования" v2.0.
#
# Назначение:
#   Прозрачный прокси для исходящего трафика из Docker-сети "Студии". Пропускает
#   только домены из whitelist.txt, всё остальное — блокирует. Используется
#   OpenHands и другими агентами для безопасного выхода в интернет.
#
# Ключевые решения v2.0:
#   - cache deny all: НЕ кэшировать ответы. Кэширование LLM-ответов опасно —
#     может вернуть устаревший результат и сломать детерминизм loop-ов.
#   - via off + forwarded_for off: не раскрывать внутреннюю структуру
#     запросов в HTTP-заголовках (минимизация утечки информации).
#   - Короткие таймауты (30/60/60 секунд): агент не должен "зависать" на
#     внешнем ресурсе.
#
# Файл whitelist.txt лежит в /etc/squid/whitelist.txt внутри контейнера.
# Все комментарии на русском, без эмодзи.
# ============================================================================

# ---------------------------------------------------------------------------
# 1. Порт и сетевой диапазон "Студии"
# ---------------------------------------------------------------------------
http_port 3128
acl studio_net src 172.20.0.0/16

# ---------------------------------------------------------------------------
# 2. Whitelist доменов (один домен на строку, поддерживаются wildcard)
# ---------------------------------------------------------------------------
acl whitelist dstdomain "/etc/squid/whitelist.txt"

# ---------------------------------------------------------------------------
# 3. Правила доступа (deny all, allow explicitly)
# ---------------------------------------------------------------------------
# Сначала разрешаем studio_net + whitelist, потом запрещаем всё остальное.
http_access allow studio_net whitelist
http_access deny all

# ---------------------------------------------------------------------------
# 4. Логирование
# ---------------------------------------------------------------------------
access_log /var/log/squid/access.log squid
cache_log /var/log/squid/cache.log

# ---------------------------------------------------------------------------
# 5. Кэш: отключён (см. комментарий в шапке)
# ---------------------------------------------------------------------------
cache deny all

# ---------------------------------------------------------------------------
# 6. HTTP-заголовки: не раскрывать внутреннюю структуру
# ---------------------------------------------------------------------------
via off
forwarded_for off

# ---------------------------------------------------------------------------
# 7. Таймауты (короткие — агент не должен зависать на внешнем ресурсе)
# ---------------------------------------------------------------------------
connect_timeout 30 seconds
read_timeout 60 seconds
write_timeout 60 seconds

# ---------------------------------------------------------------------------
# 8. Имя хоста (видно в HTTP-ответах при ошибке)
# ---------------------------------------------------------------------------
visible_hostname egress-squid
