# ============================================================================
# holix-python-dev.yaml
# ============================================================================
# Holix Python Dev — исполнитель бэкенд-задач в "Студии программирования" v2.0.
#
# Назначение:
#   Пишет production-код Python по декомпозированным подзадачам от
#   holix-backend-lead. Результат сдаёт обратно team lead'у; проверку
#   выполняет holix-qa (maker-checker).
#
# Ключевые особенности:
#   - Роль executor: пишет код сам (в отличие от team lead).
#   - Температура 0.2 — точность генерации кода.
#   - Read-only доступа к мозгу нет — контекст приходит в задаче от лида.
#
# LLM-провайдер: DeepSeek, deepseek-chat, температура 0.2.
# ============================================================================

# ---------------------------------------------------------------------------
# 1. Профиль агента
# ---------------------------------------------------------------------------
profile:
  name: holix-python-dev
  role: executor
  description: >
    Исполнитель бэкенд-команды. Пишет Python-код (FastAPI, SQLAlchemy,
    Celery) по подзадачам от holix-backend-lead. Сдаёт артефакты лиду,
    проверяется holix-qa.

# ---------------------------------------------------------------------------
# 2. LLM-модель
# ---------------------------------------------------------------------------
model:
  provider: deepseek
  name: deepseek-chat
  temperature: 0.2          # точность генерации кода
  max_tokens: 8192
  timeout: 180

# ---------------------------------------------------------------------------
# 3. Инструменты
# ---------------------------------------------------------------------------
tools:
  enabled:
    - shell
    - files
  restricted_commands:
    - "rm -rf"
    - "sudo"
    - "docker *"
    - "git push --force"
    - "curl *"
    - "wget *"

# ---------------------------------------------------------------------------
# 4. Workspace (jail)
# ---------------------------------------------------------------------------
workspace:
  jail_path: /workspace/python-dev
  read_only_paths:
    - /workspace/python-dev/tasks-incoming    # подзадачи от backend-lead
  writable_paths:
    - /workspace/python-dev/src
    - /workspace/python-dev/artifacts-outgoing
  max_file_size_mb: 30

# ---------------------------------------------------------------------------
# 5. Сеть
# ---------------------------------------------------------------------------
network:
  egress_allow:
    - api.deepseek.com
    - pypi.org
    - files.pythonhosted.org
  egress_deny:
    - "*"
  internal_services:
    - holix-backend-lead              # получение задач / сдача результата
    - holix-qa                        # проверяющий

# ---------------------------------------------------------------------------
# 6. Профильные специализации
# ---------------------------------------------------------------------------
specialty: backend
languages:
  - python
  - sql
frameworks:
  - fastapi
  - sqlalchemy
  - celery
  - pytest

# ---------------------------------------------------------------------------
# 7. Лимиты
# ---------------------------------------------------------------------------
limits:
  max_tokens_per_hour: 80000
  max_requests_per_minute: 20
  daily_cost_usd_limit: 5.00

# ---------------------------------------------------------------------------
# 8. Healthcheck
# ---------------------------------------------------------------------------
healthcheck:
  command: "holix healthcheck --agent=python-dev"
  interval: 30s
  timeout: 10s
  retries: 3

# ---------------------------------------------------------------------------
# 9. Логирование
# ---------------------------------------------------------------------------
logging:
  level: info
  format: json
  destination: /var/log/holix/python-dev.log
  rotate_size_mb: 50
  rotate_keep: 7
  sanitize_secrets: true
