# ============================================================================
# holix-react-dev.yaml
# ============================================================================
# Holix React Dev — исполнитель фронтенд-задач в "Студии программирования" v2.0.
#
# Назначение:
#   Пишет production-код фронтенда (React, TypeScript) по декомпозированным
#   подзадачам от holix-frontend-lead. Результат сдаёт обратно team lead'у;
#   проверку выполняет holix-qa (maker-checker).
#
# Ключевые особенности:
#   - Роль executor: пишет код сам (в отличие от team lead).
#   - Температура 0.2 — точность генерации кода.
#   - Read-only доступа к мозгу нет — контекст приходит в задаче от лида.
#
# LLM-провайдер: DeepSeek, deepseek-chat, температура 0.2.
# ============================================================================

# ---------------------------------------------------------------------------
# 1. Профиль агента
# ---------------------------------------------------------------------------
profile:
  name: holix-react-dev
  role: executor
  description: >
    Исполнитель фронтенд-команды. Пишет React/TypeScript-код по подзадачам
    от holix-frontend-lead. Сдаёт артефакты лиду, проверяется holix-qa.

# ---------------------------------------------------------------------------
# 2. LLM-модель
# ---------------------------------------------------------------------------
model:
  provider: deepseek
  name: deepseek-chat
  temperature: 0.2          # точность генерации кода
  max_tokens: 8192
  timeout: 180

# ---------------------------------------------------------------------------
# 3. Инструменты
# ---------------------------------------------------------------------------
tools:
  enabled:
    - shell
    - files
  restricted_commands:
    - "rm -rf"
    - "sudo"
    - "docker *"
    - "git push --force"
    - "curl *"
    - "wget *"

# ---------------------------------------------------------------------------
# 4. Workspace (jail)
# ---------------------------------------------------------------------------
workspace:
  jail_path: /workspace/react-dev
  read_only_paths:
    - /workspace/react-dev/tasks-incoming     # подзадачи от frontend-lead
  writable_paths:
    - /workspace/react-dev/src
    - /workspace/react-dev/artifacts-outgoing
  max_file_size_mb: 30

# ---------------------------------------------------------------------------
# 5. Сеть
# ---------------------------------------------------------------------------
network:
  egress_allow:
    - api.deepseek.com
    - registry.npmjs.org
  egress_deny:
    - "*"
  internal_services:
    - holix-frontend-lead             # получение задач / сдача результата
    - holix-qa                        # проверяющий

# ---------------------------------------------------------------------------
# 6. Профильные специализации
# ---------------------------------------------------------------------------
specialty: frontend
languages:
  - typescript
  - javascript
frameworks:
  - react
  - vite
  - vitest

# ---------------------------------------------------------------------------
# 7. Лимиты
# ---------------------------------------------------------------------------
limits:
  max_tokens_per_hour: 80000
  max_requests_per_minute: 20
  daily_cost_usd_limit: 5.00

# ---------------------------------------------------------------------------
# 8. Healthcheck
# ---------------------------------------------------------------------------
healthcheck:
  command: "holix healthcheck --agent=react-dev"
  interval: 30s
  timeout: 10s
  retries: 3

# ---------------------------------------------------------------------------
# 9. Логирование
# ---------------------------------------------------------------------------
logging:
  level: info
  format: json
  destination: /var/log/holix/react-dev.log
  rotate_size_mb: 50
  rotate_keep: 7
  sanitize_secrets: true
