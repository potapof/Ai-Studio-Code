      HOLIX_CONFIG_PATH: /config/config.yaml
      REQUIRE_AUTH: "false"            # внутренний воркер: без auth, вход с auth — coordinator
      LLM_PROVIDER: deepseek
      LLM_API_KEY: ${DEEPSEEK_API_KEY}
      LLM_MODEL: deepseek-v4-flash
      LLM_TEMPERATURE: "0.0"
      TZ: ${TZ:-Europe/Moscow}
      MAX_STEPS: "2"
    volumes:
      - ./examples/configs/holix-qa.yaml:/config/config.yaml:ro
      - holix_qa_data:/workspace
      - /tmp/holix-worktrees:/worktrees:ro
    networks:
      ai_studio_net:
      studio-net:
        ipv4_address: 172.20.0.47
    <<: *holix-security
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '3'
    logging: *default-logging

  holix-loop-checker:
    image: ai-studio-holix-backend:latest
    container_name: holix-loop-checker
    restart: unless-stopped
    command: ["sh", "-c", "holix models add deepseek </dev/null 2>/dev/null || true; holix config set model deepseek-chat >/dev/null 2>&1 || true; holix config set base_url https://api.deepseek.com/v1 >/dev/null 2>&1 || true; sed -i 's/default_model: deepseek-v4-flash/default_model: deepseek-chat/' /root/.holix/profiles/default/config.yaml 2>/dev/null || true; exec holix gateway start --foreground"]
    depends_on:
      - postgres-db
    env_file: .env
    environment:
