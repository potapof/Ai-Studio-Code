      HOLIX_CONFIG_PATH: /config/config.yaml
      REQUIRE_AUTH: "false"            # внутренний воркер: без auth, вход с auth — coordinator
      LLM_PROVIDER: deepseek
      LLM_API_KEY: ${DEEPSEEK_API_KEY}
      LLM_MODEL: deepseek-v4-flash
      LLM_TEMPERATURE: "0.0"
      TZ: ${TZ:-Europe/Moscow}
      MAX_STEPS: "2"
    volumes:
      - ./examples/configs/holix-loop-checker.yaml:/config/config.yaml:ro
      - holix_loop_checker_data:/workspace
      - /tmp/holix-worktrees:/worktrees:ro
    networks:
      ai_studio_net:
      studio-net:
        ipv4_address: 172.20.0.48
    <<: *holix-security
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2'
    logging: *default-logging

  holix-lint:
    image: ai-studio-holix-backend:latest
    container_name: holix-lint
    restart: unless-stopped
    command: ["sh", "-c", "holix models add deepseek </dev/null 2>/dev/null || true; holix config set model deepseek-chat >/dev/null 2>&1 || true; holix config set base_url https://api.deepseek.com/v1 >/dev/null 2>&1 || true; sed -i 's/default_model: deepseek-v4-flash/default_model: deepseek-chat/' /root/.holix/profiles/default/config.yaml 2>/dev/null || true; exec holix gateway start --foreground"]
    depends_on:
      - postgres-db
    env_file: .env
    environment:
      HOLIX_PROFILE: lint
      HOLIX_CONFIG_PATH: /config/config.yaml
      REQUIRE_AUTH: "false"            # внутренний воркер: без auth, вход с auth — coordinator
      LLM_PROVIDER: deepseek
      LLM_API_KEY: ${DEEPSEEK_API_KEY}
      LLM_MODEL: deepseek-v4-flash
      LLM_TEMPERATURE: "0.0"
      TZ: ${TZ:-Europe/Moscow}
      MAX_STEPS: "2"
    volumes:
      - ./examples/configs/holix-lint.yaml:/config/config.yaml:ro
      - holix_lint_data:/workspace
      - /tmp/holix-worktrees:/worktrees:ro
    networks:
      ai_studio_net:
      studio-net:
        ipv4_address: 172.20.0.49
    <<: *holix-security
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    logging: *default-logging

  # =====================================================================
  # БЕЗОПАСНОСТЬ: Egress Proxy (Squid, ACL по studio-net 172.20/16)
  # =====================================================================
  egress-proxy:
    image: ubuntu/squid:latest
    container_name: egress-squid
    restart: unless-stopped
    volumes:
      - ./examples/configs/squid.conf:/etc/squid/squid.conf:ro
      - ./examples/configs/squid-whitelist.txt:/etc/squid/whitelist.txt:ro
      - egress_logs:/var/log/squid
    networks:
      ai_studio_net:
      studio-net:
        ipv4_address: 172.20.0.100
    ports:
      - "3128:3128"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging: *default-logging

  # =====================================================================
  # МОНИТОРИНГ: Portainer
  # =====================================================================
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    ports:
      - "9000:9000"
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      ai_studio_net:
      studio-net:
        ipv4_address: 172.20.0.70
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    logging: *default-logging

  # =====================================================================
  # СИНХРОНИЗАЦИЯ: Syncthing (P2P с Windows-хостом)
  # =====================================================================
  syncthing:
    image: lscr.io/linuxserver/syncthing:latest
    container_name: syncthing
    restart: unless-stopped
    environment:
      PUID: 1000
      PGID: 1000
