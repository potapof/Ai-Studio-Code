      - holix_frontend_lead_data:/workspace
      - /tmp/holix-worktrees:/worktrees:ro
    networks:
      ai_studio_net:
      studio-net:
        ipv4_address: 172.20.0.44
    <<: *holix-security
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2'
    logging: *default-logging

  holix-python-dev:
    image: ai-studio-holix-backend:latest
    container_name: holix-python-dev
    restart: unless-stopped
    command: ["sh", "-c", "holix models add deepseek </dev/null 2>/dev/null || true; holix config set model deepseek-chat >/dev/null 2>&1 || true; holix config set base_url https://api.deepseek.com/v1 >/dev/null 2>&1 || true; sed -i 's/default_model: deepseek-v4-flash/default_model: deepseek-chat/' /root/.holix/profiles/default/config.yaml 2>/dev/null || true; exec holix gateway start --foreground"]
    depends_on:
      - postgres-db
    env_file: .env
    environment:
      HOLIX_PROFILE: python-dev
      HOLIX_CONFIG_PATH: /config/config.yaml
      REQUIRE_AUTH: "false"            # внутренний воркер: без auth, вход с auth — coordinator
      LLM_PROVIDER: deepseek
      LLM_API_KEY: ${DEEPSEEK_API_KEY}
      LLM_MODEL: deepseek-v4-flash
      LLM_TEMPERATURE: "0.2"
      TZ: ${TZ:-Europe/Moscow}
      MAX_STEPS: "2"
    volumes:
      - ./examples/configs/holix-python-dev.yaml:/config/config.yaml:ro
      - holix_python_dev_data:/workspace
      - /tmp/holix-worktrees:/worktrees
    networks:
      ai_studio_net:
      studio-net:
        ipv4_address: 172.20.0.45
    <<: *holix-security
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '4'
    logging: *default-logging

  holix-react-dev:
    image: ai-studio-holix-backend:latest
    container_name: holix-react-dev
    restart: unless-stopped
    command: ["sh", "-c", "holix models add deepseek </dev/null 2>/dev/null || true; holix config set model deepseek-chat >/dev/null 2>&1 || true; holix config set base_url https://api.deepseek.com/v1 >/dev/null 2>&1 || true; sed -i 's/default_model: deepseek-v4-flash/default_model: deepseek-chat/' /root/.holix/profiles/default/config.yaml 2>/dev/null || true; exec holix gateway start --foreground"]
    depends_on:
      - postgres-db
    env_file: .env
    environment:
      HOLIX_PROFILE: react-dev
      HOLIX_CONFIG_PATH: /config/config.yaml
      REQUIRE_AUTH: "false"            # внутренний воркер: без auth, вход с auth — coordinator
      LLM_PROVIDER: deepseek
      LLM_API_KEY: ${DEEPSEEK_API_KEY}
      LLM_MODEL: deepseek-v4-flash
      LLM_TEMPERATURE: "0.2"
      TZ: ${TZ:-Europe/Moscow}
      MAX_STEPS: "2"
    volumes:
      - ./examples/configs/holix-react-dev.yaml:/config/config.yaml:ro
      - holix_react_dev_data:/workspace
      - /tmp/holix-worktrees:/worktrees
    networks:
      ai_studio_net:
      studio-net:
        ipv4_address: 172.20.0.46
    <<: *holix-security
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '4'
    logging: *default-logging

  holix-qa:
