# ============================================================================
# holix-coordinator.yaml
# ============================================================================
# Holix Coordinator — шлюз между Hermes и OpenHands в "Студии программирования"
# v2.0.
#
# Назначение:
#   Принимает HandoffPacket от Hermes, формирует ограниченный контекст для
#   OpenHands (только необходимая часть — без утечки внутренних секретов),
#   делегирует задачу, принимает результат, передаёт обратно Hermes.
#
# Ключевая особенность v2.0:
#   - Подключается к мозгу через postgres MCP в режиме read_only (только
#     SELECT). Координатор НЕ должен писать в мозг напрямую — запись идёт
#     только через Архивариуса или самого Hermes.
#   - NocoDB доступен только в режиме read_only (приборная панель для чтения
#     статусов задач из Kanban).
#
# LLM-провайдер: DeepSeek, deepseek-chat, температура 0.2 (максимальная
# точность при формировании контекста — нельзя упустить важные детали).
# ============================================================================

# ---------------------------------------------------------------------------
# 1. Профиль агента
# ---------------------------------------------------------------------------
profile:
  name: holix-coordinator
  role: coordinator
  description: >
    Шлюз Hermes <-> OpenHands. Формирует минимальный необходимый контекст
    для делегирования задач внешнему подрядчику (OpenHands). Не принимает
    архитектурных решений, только пересылает данные.

# ---------------------------------------------------------------------------
# 2. LLM-модель
# ---------------------------------------------------------------------------
model:
  provider: deepseek
  name: deepseek-chat
  temperature: 0.2          # точность формирования контекста
  max_tokens: 4096
  timeout: 120

# ---------------------------------------------------------------------------
# 3. Инструменты
# ---------------------------------------------------------------------------
tools:
  enabled:
    - shell
    - files
    - http_request_postgres          # запросы к Postgres через MCP
    - http_request_nocodb_read_only  # чтение Kanban/CRM из NocoDB
    - delegate_to_openhands          # делегирование задачи внешнему подрядчику
  restricted_commands:
    - "rm -rf"
    - "git push"
    - "git merge"
    - "sudo"
    - "dd"
    - "mkfs"

# ---------------------------------------------------------------------------
# 4. Workspace (jail)
# ---------------------------------------------------------------------------
workspace:
  jail_path: /workspace/coordinator
  read_only_paths:
    - /workspace/coordinator/config
  writable_paths:
    - /workspace/coordinator/handoffs-incoming
    - /workspace/coordinator/handoffs-outgoing
  max_file_size_mb: 50

# ---------------------------------------------------------------------------
# 5. Сеть (deny all, allow explicitly)
# ---------------------------------------------------------------------------
network:
  egress_allow:
    - api.deepseek.com              # только LLM-провайдер
  egress_deny:
    - "*"
  internal_services:
    - nocodb-postgres-db:5432       # мозг (PostgreSQL)
    - nocodb-app:8080               # приборная панель (NocoDB, read_only)
    - openhands                     # внешний подрядчик
    - hermes:8082                   # обратная связь к Hermes (MCP-сервер)

# ---------------------------------------------------------------------------
# 6. MCP-серверы (только для доступа к мозгу, read_only)
# ---------------------------------------------------------------------------
mcp_servers:
  - name: postgres-readonly
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-postgres", "${HERMES_POSTGRES_URL}"]
    access: read_only               # только SELECT, без INSERT/UPDATE/DELETE
    tools:
      - query                       # параметризованные SELECT
      - list_tables
      - describe_table
    description: >
      Координатор читает из мозга только необходимые для формирования
      контекста данные: текущие задачи, handoff_documents, активные сессии.
      Запись запрещена — это задача Архивариуса и Hermes.

# ---------------------------------------------------------------------------
# 7. Лимиты
# ---------------------------------------------------------------------------
limits:
  max_tokens_per_hour: 50000
  max_requests_per_minute: 10
  daily_cost_usd_limit: 5.00
  max_delegations_per_hour: 20      # ограничение на делегирование OpenHands

# ---------------------------------------------------------------------------
# 8. Healthcheck
# ---------------------------------------------------------------------------
healthcheck:
  command: "holix healthcheck --agent=coordinator"
  interval: 30s
  timeout: 10s
  retries: 3

# ---------------------------------------------------------------------------
# 9. Логирование
# ---------------------------------------------------------------------------
logging:
  level: info
  format: json
  destination: /var/log/holix/coordinator.log
  rotate_size_mb: 50
  rotate_keep: 7
  sanitize_secrets: true
