# ============================================================================
# holix-loop-checker.yaml
# ============================================================================
# Holix Loop Checker — бинарный проверяющий для Loop Engineering в "Студии
# программирования" v2.0.
#
# Назначение:
#   Тестирует результат Maker'а внутри loop (maker-checker-arbiter цикла).
#   В отличие от holix-qa (который проверяет финальный артефакт перед PR),
#   loop-checker работает в каждой итерации loop'а и проверяет промежуточный
#   результат по жёстким критериям.
#
# Ключевая особенность v2.0:
#   - Loop Checker НЕ видит промпт Maker'а и НЕ знает его намерений.
#     Это защищает от "эффекта симпатии" — смягчения критериев, когда Checker
#     понимает, что хотел сделать Maker.
#   - Температура 0.0 — детерминированные вердикты.
#   - Те же проверки, что у QA, но БЕЗ trufflehog (его запускает отдельный
#     агент в финальной стадии).
#   - Вердикты строго PASS / FAIL / NEEDS_HUMAN.
#
# LLM-провайдер: DeepSeek, deepseek-chat, температура 0.0 (максимальная
# объективность).
# ============================================================================

# ---------------------------------------------------------------------------
# 1. Профиль агента
# ---------------------------------------------------------------------------
profile:
  name: holix-loop-checker
  role: loop_checker
  description: >
    Объективный проверяющий для loop-циклов. Не видит промпт Maker'а, не
    знает его намерений. Проверяет ТОЛЬКО результат по жёстким критериям.
    Не может дать шанс или поверить на слово.

# ---------------------------------------------------------------------------
# 2. LLM-модель
# ---------------------------------------------------------------------------
model:
  provider: deepseek
  name: deepseek-chat
  temperature: 0.0          # максимальная объективность
  max_tokens: 4096
  timeout: 120

# ---------------------------------------------------------------------------
# 3. Принципы system prompt
# ---------------------------------------------------------------------------
# Эти принципы буквально вшиваются в system prompt агента перед каждой
# итерацией. Они защищают от "эффекта симпатии" к Maker'у.
system_prompt_principles:
  - "Ты НЕ видишь промпт Maker'а, только результат"
  - "Ты НЕ знаешь намерений Maker'а"
  - "Ты проверяешь ТОЛЬКО по жёстким критериям"
  - "Ты НЕ можешь дать шанс или поверить на слово"

# ---------------------------------------------------------------------------
# 4. Инструменты
# ---------------------------------------------------------------------------
tools:
  enabled:
    - shell
    - files
  restricted_commands:
    - "git *"
    - "docker *"
    - "sudo"
    - "curl *"
    - "wget *"
    - "rm -rf /"

# ---------------------------------------------------------------------------
# 5. Workspace (jail)
# ---------------------------------------------------------------------------
workspace:
  jail_path: /workspace/loop-checker
  read_only_paths:
    - /workspace/loop-checker/results-incoming   # результат Maker'а (без промпта)
  writable_paths:
    - /workspace/loop-checker/verdicts
    - /tmp
  max_file_size_mb: 30

# ---------------------------------------------------------------------------
# 6. Сеть (полная изоляция)
# ---------------------------------------------------------------------------
network:
  egress_allow: []
  egress_deny:
    - "*"
  internal_services: []

# ---------------------------------------------------------------------------
# 7. Вердикты
# ---------------------------------------------------------------------------
# Только три исхода. Никаких "скорее PASS" или "почти FAIL".
verdicts:
  - PASS
  - FAIL
  - NEEDS_HUMAN

# ---------------------------------------------------------------------------
# 8. Перечень проверок (аналогично holix-qa, но БЕЗ trufflehog)
# ---------------------------------------------------------------------------
# trufflehog запускается отдельным агентом в финальной стадии перед PR —
# в loop'е он не нужен (экономия времени и токенов).
checks:
  - name: pytest
    command: "pytest -v --tb=short --junitxml=/tmp/pytest.xml"
    required: true
    timeout_seconds: 300

  - name: flake8
    command: "flake8 --max-line-length=120 --format=json"
    required: true
    timeout_seconds: 60

  - name: bandit
    command: "bandit -r . -f json -o /tmp/bandit.json"
    required: true
    timeout_seconds: 120

  - name: semgrep
    command: "semgrep --config=auto --json"
    required: true
    timeout_seconds: 180

  - name: pip-audit
    command: "pip-audit --strict --format=json"
    required: false
    timeout_seconds: 90

# ---------------------------------------------------------------------------
# 9. Формат вердикта
# ---------------------------------------------------------------------------
verdict_format: |
  CHECKER_VERDICT: {PASS|FAIL|NEEDS_HUMAN}
  DETAILS:
  - pytest: {pass/fail} ({N} tests, {M} failed)
  - flake8: {pass/fail} ({N} issues)
  - bandit: {pass/fail} ({N} issues, severity: {low/med/high})
  - semgrep: {pass/fail} ({N} findings)
  ESCALATION_REASON: (если FAIL или NEEDS_HUMAN)

# ---------------------------------------------------------------------------
# 10. Лимиты (жёстче, чем у QA — loop-чекер вызывается чаще)
# ---------------------------------------------------------------------------
limits:
  max_tokens_per_hour: 20000
  max_requests_per_minute: 5
  daily_cost_usd_limit: 1.00
  max_concurrent_checks: 1

# ---------------------------------------------------------------------------
# 11. Healthcheck
# ---------------------------------------------------------------------------
healthcheck:
  command: "holix healthcheck --agent=loop-checker"
  interval: 30s
  timeout: 10s
  retries: 3

# ---------------------------------------------------------------------------
# 12. Логирование
# ---------------------------------------------------------------------------
logging:
  level: info
  format: json
  destination: /var/log/holix/loop-checker.log
  rotate_size_mb: 50
  rotate_keep: 7
  sanitize_secrets: true
